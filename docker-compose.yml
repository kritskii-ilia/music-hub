services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: music_hub
      POSTGRES_USER: music_hub
      POSTGRES_PASSWORD: music_hub
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  minio:
    image: minio/minio:RELEASE.2025-02-03T21-03-04Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  create-bucket:
    image: minio/mc:RELEASE.2025-02-08T19-14-21Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done &&
      /usr/bin/mc mb -p local/music-hub || true &&
      /usr/bin/mc anonymous set download local/music-hub
      "

volumes:
  postgres-data:
  minio-data:
